    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    
    
    
    <header style="position: relative; z-index: 1000;">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    
    <img src="/assets/logo.png" alt="Valentina Russo Logo" class="brand-logo">
    <div class="brand-text">
        <span class="brand-name">VALENTINA RUSSO</span>
        <span class="brand-tagline">Consulente BG5</span>
    </div>
                </a>
            </div>
            <button class="menu-toggle" aria-label="Menu">☰</button>
            <nav>
                
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="servizi.html">Servizi</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="chi-sono.html">Chi Sono</a></li>
                    <li><a href="contatti.html">Contatti</a></li>
                    <li><a href="aziende.html" class="btn" style="background-color: var(--corp-primary); color: white; padding: 0.4rem 1rem; font-size: 0.85rem; border-radius: 4px;">Percorso Aziende</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="section-padding">
        <div class="container" style="max-width: 800px;">
            <h1 class="text-center" style="margin-bottom: var(--space-lg);" data-animate>Iniziamo una conversazione</h1>

            <div class="card"
                style="background-color: var(--white); padding: var(--space-lg); border-radius: 20px; border: 1px solid var(--soft-gray);"
                data-animate>
                <form id="contact-form" action="mailer.php" method="POST" style="display: grid; gap: 1.5rem;">
                    <div style="display: grid; gap: 0.5rem;">
                        <label class="text-uppercase text-small" style="font-weight: 600;">Nome Completo</label>
                        <input type="text" name="name" required
                            style="padding: 1rem; border: 1px solid var(--soft-gray); border-radius: 5px; font-family: inherit;">
                    </div>
                    <div style="display: grid; gap: 0.5rem;">
                        <label class="text-uppercase text-small" style="font-weight: 600;">Email</label>
                        <input type="email" name="email" required
                            style="padding: 1rem; border: 1px solid var(--soft-gray); border-radius: 5px; font-family: inherit;">
                    </div>
                    <div style="display: grid; gap: 0.5rem;">
                        <label class="text-uppercase text-small" style="font-weight: 600;">Messaggio / Tipo di
                            Consulenza</label>
                        <textarea name="message" required
                            style="padding: 1rem; border: 1px solid var(--soft-gray); border-radius: 5px; height: 150px; font-family: inherit;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Invia Messaggio</button>
                    <div id="form-response"
                        style="display: none; padding: 1rem; border-radius: 5px; margin-top: 1rem; text-align: center;">
                    </div>
                </form>

                <script>
                    document.getElementById('contact-form').addEventListener('submit', async function (e) {
                        e.preventDefault();
                        const form = this;
                        const responseDiv = document.getElementById('form-response');
                        const data = new FormData(form);

                        try {
                            const res = await fetch(form.action, {
                                method: 'POST',
                                body: data
                            });
                            const result = await res.json();

                            responseDiv.style.display = 'block';
                            responseDiv.textContent = result.message;

                            if (result.status === 'success') {
                                responseDiv.style.backgroundColor = '#d4edda';
                                responseDiv.style.color = '#155724';
                                form.reset();
                            } else {
                                responseDiv.style.backgroundColor = '#f8d7da';
                                responseDiv.style.color = '#721c24';
                            }
                        } catch (error) {
                            responseDiv.style.display = 'block';
                            responseDiv.style.backgroundColor = '#f8d7da';
                            responseDiv.style.color = '#721c24';
                            responseDiv.textContent = "Si è verificato un errore durante l'invio del messaggio.";
                        }
                    });
                </script>
            </div>

            <div class="text-center" style="margin-top: var(--space-lg);" data-animate>
                <h3>O scrivimi direttamente:</h3>
                <p style="margin-top: 1rem;">info@valentinarussobg5.com</p>
                <p>Instagram: <a href="#" style="color: var(--primary-color);">@valentina_russo_bg5</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
