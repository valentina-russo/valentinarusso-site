home:
    alias: /home

pages:
    theme: valentina
    markdown:
        extra: true
        auto_line_breaks: false
    process:
        markdown: true
        twig: true
    twig_first: false
    never_cache_twig: false
    events:
        page: true
        twig: true

cache:
    enabled: true
    check:
        method: file
    driver: auto
    prefix: 'g'
    clear_images_by_default: true
    cli_compatibility: false
    lifetime: 604800
    gzip: false
    allow_webserver_gzip: false
    redis:
        socket: false
        password:
        database: 0

twig:
    cache: true
    debug: false
    auto_reload: true
    autoescape: false
    undefined_functions: true
    undefined_filters: true
    umask_fix: false

assets:
    css_pipeline: false
    css_pipeline_include_externals: true
    css_pipeline_before_excludes: true
    css_minify: true
    css_minify_windows: false
    css_rewrite: true
    js_pipeline: false
    js_pipeline_include_externals: true
    js_pipeline_before_excludes: true
    js_minify: true
    enable_asset_timestamp: false
    collections:
        jquery: system://assets/jquery/jquery-2.x.min.js

errors:
    display: 1
    log: true

log:
    handler: file
    syslog:
        facility: local6

debugger:
    enabled: false
    provider: clockwork
    censored: false

images:
    default_image_quality: 85
    cache_all: false
    cache_perms: '0755'
    debug: false
    auto_fix_orientation: false

media:
    enable_media_timestamp: false
    upload_limit: 104857600

session:
    enabled: true
    initialize: true
    timeout: 1800
    name: grav-site
    uniqueness: path
    path:
    secure: false
    httponly: true
    domain:
    split: true

gpm:
    releases: stable
    proxy_url:
    method: auto
    verify_peer: true

reverse_proxy_setup: false

languages:
    supported:
        - it
    default_lang: it
    include_default_lang: false
    pages_fallback_only: false
    translations: true
    translations_fallback: true
    session_store_active: false
    http_accept_language: false
    override_locale: false

uri:
    include_host_in_base_url: false
    include_port_in_base_url: false
    trailing_slash: false
