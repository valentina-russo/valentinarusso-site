# esistono (gli articoli vivono in pages/04.blog/{slug}/ direttamente). Il vecchio set
# di redirect causava 500 perché Grav rincorreva URL inesistenti.
redirects:
    '/genera-carta':                                        ['/calcolo-human-design', 301]
