title: Articolo Blog

form:
  fields:

    title:
      type: text
      label: "Titolo articolo"
      validate:
        required: true

    content:
      type: markdown
      label: "Testo"
      validate:
        required: true

    published:
      type: toggle
      label: "Pubblica sul sito"
      highlight: 1
      default: 0
      options:
        1: "Sì, pubblica"
        0: "No, tieni in bozza"
      validate:
        type: bool

    date:
      type: datetime
      label: "Data"
      format: "Y-m-d H:i:s"
      validate:
        required: true

    header.description:
      type: textarea
      label: "Anteprima (appare nella lista articoli)"
      rows: 2

    header.featured_image:
      type: text
      label: "Immagine copertina"
      placeholder: "/user/images/blog/nome-immagine.jpg"
      help: "Carica dalla scheda Media → poi copia qui il percorso."

    header.image_alt:
      type: text
      label: "Descrizione immagine (alt text)"
