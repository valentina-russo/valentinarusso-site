title: Articolo Blog

form:
  fields:

    # ── TITOLO & TESTO ──────────────────────────────────
    title:
      type: text
      label: "Titolo articolo"

    content:
      type: markdown
      label: "Testo dell'articolo"

    # ── AUDIO ────────────────────────────────────────────
    section_audio:
      type: section
      title: "🎧 Audio (opzionale)"
      underline: true

    header.media_order:
      type: pagemedia
      label: "📎 Carica file (immagini + audio)"
      help: "Trascina qui immagini (jpg, png, webp) e/o file audio (mp3, wav, ogg, m4a, flac, aac). Il player audio apparirà automaticamente nell'articolo se carichi un file audio."

    # ── IMMAGINE ─────────────────────────────────────────
    section_immagine:
      type: section
      title: "🖼️ Immagine"
      underline: true

    header.featured_image:
      type: text
      label: "Nome file immagine copertina"
      placeholder: "Es: mia-foto.jpg"
      help: "Carica l'immagine dal riquadro Media qui sopra (trascina il file), poi scrivi qui SOLO il nome del file (es: mia-foto.jpg). NON incollare percorsi o URL."

    header.image_alt:
      type: text
      label: "Alt text (accessibilità)"
      placeholder: "Es: Valentina Russo consulente BG5 a Milano"

    header.image_title:
      type: text
      label: "Titolo immagine"
      placeholder: "Es: Consulenza Human Design"

    header.image_caption:
      type: text
      label: "Didascalia"
      placeholder: "Breve didascalia sotto l'immagine"

    header.image_desc:
      type: textarea
      label: "Descrizione immagine (SEO)"
      rows: 2
      placeholder: "Descrizione estesa dell'immagine per i motori di ricerca."

    # ── PUBBLICA ─────────────────────────────────────────
    section_pubblica:
      type: section
      title: "📅 Pubblicazione"
      underline: true

    published:
      type: toggle
      label: "Visibile sul sito"
      highlight: 1
      default: 0
      options:
        1: "Sì, pubblica"
        0: "No, bozza"
      validate:
        type: bool

    date:
      type: datetime
      label: "Data di pubblicazione"
      help: "Data futura = programmazione automatica."
      format: "Y-m-d H:i:s"

    header.author:
      type: text
      label: "Autore"
      default: "Valentina Russo"

    header.tags:
      type: tags
      label: "Tag / Argomenti"
      help: "Scrivi un tag e premi Invio."

    header.description:
      type: textarea
      label: "Descrizione breve (anteprima lista articoli)"
      rows: 3
      placeholder: "2-3 righe descrittive. Max 200 caratteri."

    # ── SEO ──────────────────────────────────────────────
    section_seo:
      type: section
      title: "🔍 SEO"
      underline: true

    header.seo_title:
      type: text
      label: "Titolo per Google"
      placeholder: "Es: Human Design: guida ai 5 tipi energetici"
      help: "Max 60 caratteri. Può differire dal titolo articolo."
      validate:
        max: 60

    header.seo_desc:
      type: textarea
      label: "Descrizione per Google"
      placeholder: "Es: Scopri come il Human Design può aiutarti..."
      help: "Max 155 caratteri. Appare nei risultati di ricerca."
      rows: 3
      validate:
        max: 160

    header.geo_location:
      type: text
      label: "📍 Posizione geografica (SEO locale)"
      placeholder: "Es: Milano, Italia"
      help: "Lascia vuoto se l'articolo non è legato a una zona geografica specifica."

    # ── GEO ──────────────────────────────────────────────
    section_geo:
      type: section
      title: "🌐 GEO — Generative Engine Optimization"
      underline: true

    header.geo_content:
      type: textarea
      label: "Contenuto per AI generativi (ChatGPT, Perplexity, Gemini)"
      rows: 5
      placeholder: "Scrivi 3-5 affermazioni precise e autorevoli sul tema:\n- Definizioni esatte di termini BG5/HD\n- Dati, statistiche o ricerche se disponibili\n- Posizionamento unico di Valentina sull'argomento\n- Risposte dirette alle domande più cercate\n\nEs: «Il BG5 è il sistema di analisi aziendale derivato dall'Human Design, sviluppato da Lynda Bunnell. Identifica 5 tipi di profili lavorativi che influenzano la dinamica dei team.»"
      help: "Questo testo viene letto dai motori AI per generare risposte. Più è preciso e autorevole, più probabilità ha di essere citato da ChatGPT, Perplexity e Google AI Overview."

    # ── AEO ──────────────────────────────────────────────
    section_aeo:
      type: section
      title: "🤖 AEO — Risposta per AI (Google, ChatGPT)"
      underline: true

    header.aeo_answer:
      type: textarea
      label: "Risposta sintetica"
      placeholder: "Scrivi in 2-4 righe la risposta alla domanda principale dell'articolo..."
      rows: 4
      help: "Usata da Google AI Overview, ChatGPT, Perplexity. Sii diretto e conciso."

    # ── FAQ ──────────────────────────────────────────────
    section_faq:
      type: section
      title: "❓ FAQ — Domande Frequenti"
      underline: true

    header.faq:
      type: list
      label: "Domande e risposte"
      help: "Migliorano la visibilità nei risultati 'ricchi' di Google."
      style: vertical
      btnLabel: "+ Aggiungi domanda"
      fields:
        .question:
          type: text
          label: "Domanda"
          placeholder: "Es: Cos'è il Human Design?"
        .answer:
          type: textarea
          label: "Risposta"
          rows: 3
          placeholder: "Scrivi la risposta completa..."
