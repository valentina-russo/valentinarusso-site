// ─── Swiss Ephemeris ──────────────────────────────────────────────────────────
var _csSweMod=null,_csSweCalc=null,_csSweJulday=null;
async function _csInitSwe(){
  if(_csSweMod)return;
  var SweClass=window.SwissEphemeris;if(!SweClass)throw new Error('SwissEphemeris not loaded — is swe-hd.js in the same folder?');
  var inst=new SweClass();await inst.init();
  try{await inst.loadStandardEphemeris();}catch(e){}
  _csSweMod=inst.module;
  try{
    var CDN='https://cdn.jsdelivr.net/gh/aloistr/swisseph/ephe';
    try{_csSweMod.FS.mkdir('/ephe');}catch(e){}
    await Promise.all(['sepl_18.se1','semo_18.se1'].map(async function(f){
      var resp=await fetch(CDN+'/'+f);
      if(resp.ok)_csSweMod.FS.writeFile('/ephe/'+f,new Uint8Array(await resp.arrayBuffer()));
    }));
    _csSweMod.cwrap('swe_set_ephe_path_wrap',null,['string'])('/ephe');
  }catch(e){_csSweMod.cwrap('swe_set_ephe_path_wrap',null,['string'])('');}
  _csSweCalc=function(jd,planet,flags){var ptr=_csSweMod.ccall('swe_calc_ut_wrap','number',['number','number','number'],[jd,planet,flags]);return _csSweMod.getValue(ptr,'double');};
  _csSweJulday=_csSweMod.cwrap('swe_julday_wrap','number',['number','number','number','number','number']);
}

window.csCalcola = async function(){

  var timeVal=document.getElementById('cs-time').value;
  var dp=dateVal?dateVal.split('-'):[];
  var tp=timeVal?timeVal.split(':'):[];
  var y=dp[0]?parseInt(dp[0]):NaN,m=dp[1]?parseInt(dp[1]):NaN,d=dp[2]?parseInt(dp[2]):NaN;
  var h=tp[0]!==undefined?parseInt(tp[0]):NaN,min=tp[1]!==undefined?parseInt(tp[1]):NaN;
  var tz=document.getElementById('cs-tz').value;
  var nome=document.getElementById('cs-nome').value.trim();
  var city=document.getElementById('cs-city').value.trim();
  var errEl=document.getElementById('cs-error');
  function showErr(msg){document.getElementById('cs-loading').style.display='none';document.getElementById('cs-calcola-btn').disabled=false;errEl.textContent=msg;errEl.style.display='block';}
  if(!city){showErr('Please enter your place of birth.');document.getElementById('cs-city').focus();return;}
  if(!d||!m||!y||isNaN(h)||isNaN(min)){showErr('Please fill in date, time and place of birth.');return;}

  document.getElementById('cs-results').style.display='none';
  document.getElementById('cs-loading').style.display='block';
  document.getElementById('cs-calcola-btn').disabled=true;
  try{
    var localDt=new Date(y,m-1,d,h,min);
    var tzDate=new Date(localDt.toLocaleString('en-US',{timeZone:tz}));
    var utcDate=new Date(localDt.toLocaleString('en-US',{timeZone:'UTC'}));
    var tzOff=(tzDate-utcDate)/3600000;

  finally{document.getElementById('cs-loading').style.display='none';document.getElementById('cs-calcola-btn').disabled=false;}
};

window.csScaricaPDF = async function(){
  var el=document.getElementById('cs-results');
  var btn=document.getElementById('cs-pdf-btn');
  if(!el)return;
  var nome=(document.getElementById('cs-nome')?document.getElementById('cs-nome').value:'').trim()||'human-design-chart';
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  try{
    await html2pdf().set({
      margin:[8,10,8,10],
      filename:nome.replace(/\s+/g,'-').toLowerCase()+'-human-design.pdf',
      image:{type:'jpeg',quality:0.95},
      html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:'avoid-all'}
    }).from(el).save();
  }catch(e){window.print();}
  if(btn){btn.disabled=false;btn.textContent='⬇ Download PDF';}
};
</script>
