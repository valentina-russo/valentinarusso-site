      - name: Crea libretto-dati/.env con la chiave Stripe (da GitHub Secret)
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$STRIPE_KEY" ]; then
            echo "WARN: STRIPE_SECRET_KEY non configurata — .env non verra creato"
          else
            echo "STRIPE_SECRET_KEY=$STRIPE_KEY" > grav-site/root/libretto-dati/.env
            echo "OK: .env creato (lunghezza chiave: ${#STRIPE_KEY} char)"
          fi

      - name: Deploy libretto-dati (checkout, dati, invia PHP, .env, .htaccess)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/root/libretto-dati/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}libretto-dati/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/logs/**

      - name: Crea bg5-blueprint/.env con segreti webhook (da GitHub Secrets)
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GH_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          if [ -z "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "WARN: STRIPE_WEBHOOK_SECRET non configurata — webhook operera in modalita 501"
          else
            printf "STRIPE_WEBHOOK_SECRET=%s\nGITHUB_PAT=%s\n" \
              "$STRIPE_WEBHOOK_SECRET" "$GH_PAT" \
              > grav-site/root/bg5-blueprint/.env
            echo "OK: bg5-blueprint/.env creato (webhook_secret len: ${#STRIPE_WEBHOOK_SECRET})"
          fi

      - name: Deploy bg5-blueprint runtime (stripe-webhook + .htaccess block PII)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/root/bg5-blueprint/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}bg5-blueprint/
          dangerous-clean-slate: false
          # jobs/, logs/, pdfs/ sono generati a runtime sul server: NON deployare
          # (sovrascriverebbe lo stato live e il .htaccess è nella root della cartella)
          exclude: |
            **/.git*
            **/.git*/**
            **/jobs/**
            **/logs/**
            **/pdfs/**
            **/review.php

