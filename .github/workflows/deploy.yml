name: Deploy Grav user/ su Aruba

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Deploy user/ via FTP su Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/user/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}user/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            **/.gitkeep
            accounts/**
            pages/**

      - name: Deploy .htaccess + script root (www redirect + Grav routing)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/root/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}
          dangerous-clean-slate: false

      - name: Deploy pagina workshop-proposta
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/user/pages/workshop-proposta/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}user/pages/workshop-proposta/
          dangerous-clean-slate: false

      - name: Deploy pagina hd-relazionale
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}
          username: ${{ secrets.ARUBA_FTP_USER }}
          password: ${{ secrets.ARUBA_FTP_PASS }}
          local-dir: ./grav-site/user/pages/hd-relazionale/
          server-dir: ${{ secrets.ARUBA_FTP_PATH }}user/pages/hd-relazionale/
          dangerous-clean-slate: false

      - name: Svuota cache Grav automaticamente
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://valentinarussobg5.com/cache-clear.php?token=${{ secrets.GRAV_CACHE_TOKEN }}")
          echo "Cache-clear HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Attenzione: cache-clear ha restituito $STATUS (non bloccante)"
          fi
