site_url: https://valentinarussobg5.com

backend:
  name: github
  repo: valentina-russo/valentinarusso-site
  branch: main

media_folder: "public/assets/blog"
public_folder: "/assets/blog"

collections:
  - name: "blog_privati"
    label: "Articoli Privati"
    folder: "content/blog-privati"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titolo Visibile", name: "title", widget: "string"}
      - {label: "Data Pubblicazione", name: "date", widget: "datetime"}
      - {label: "Stato", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "Foto in Evidenza", name: "featured_image", widget: "image"}
      - {label: "Sottotitolo", name: "description", widget: "text"}
      
      # SEO Metadata
      - {label: "SEO Title", name: "seo_title", widget: "string", required: false, hint: "Lascia vuoto per usare il titolo visibile"}
      - {label: "Meta Description", name: "seo_desc", widget: "text", required: false}
      
      # GEO Metadata
      - {label: "Località (GEO)", name: "geo_location", widget: "string", required: false, hint: "Es: Milano, Italia"}
      
      # AEO (Answer Engine Optimization)
      - {label: "Featured Answer (AEO)", name: "aeo_answer", widget: "text", required: false, hint: "Risposta diretta di 40-50 parole per ottimizzare la visibilità nelle AI"}
      
      - {label: "Corpo del Testo", name: "body", widget: "markdown"}

  - name: "blog_aziende"
    label: "Articoli Aziende"
    folder: "content/blog-aziende"
    create: true
    slug: "aziende-{{slug}}"
    fields:
      - {label: "Titolo Visibile", name: "title", widget: "string"}
      - {label: "Data Pubblicazione", name: "date", widget: "datetime"}
      - {label: "Stato", name: "status", widget: "select", options: ["draft", "published"], default: "draft"}
      - {label: "Foto in Evidenza", name: "featured_image", widget: "image"}
      - {label: "Sottotitolo", name: "description", widget: "text"}
      
      # SEO/GEO/AEO
      - {label: "SEO Title", name: "seo_title", widget: "string", required: false}
      - {label: "Meta Description", name: "seo_desc", widget: "text", required: false}
      - {label: "Località (GEO)", name: "geo_location", widget: "string", required: false}
      - {label: "Featured Answer (AEO)", name: "aeo_answer", widget: "text", required: false}
      
      - {label: "Corpo del Testo", name: "body", widget: "markdown"}
